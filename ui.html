<style>
  :root {
    color: var(--figma-color-text, #1e1e1e);
    background: var(--figma-color-bg, #ffffff);
    font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 12px;
  }

  body {
    margin: 0;
  }

  .app {
    display: flex;
    min-height: 100vh;
    flex-direction: column;
  }

  header {
    border-bottom: 1px solid var(--figma-color-border, #e5e5e5);
    padding: 16px;
  }

  h1 {
    margin: 0 0 8px;
    font-size: 16px;
    font-weight: 650;
    line-height: 1.3;
  }

  p {
    margin: 0;
    color: var(--figma-color-text-secondary, #6b6b6b);
    line-height: 1.45;
  }

  main {
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding: 16px;
  }

  .toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .control-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  label {
    display: grid;
    gap: 4px;
    color: var(--figma-color-text-secondary, #6b6b6b);
    line-height: 1.35;
  }

  select {
    min-height: 32px;
    border: 1px solid var(--figma-color-border, #d9d9d9);
    border-radius: 4px;
    background: var(--figma-color-bg, #ffffff);
    color: var(--figma-color-text, #1e1e1e);
    font: inherit;
    padding: 0 8px;
  }

  button {
    min-height: 32px;
    border: 1px solid var(--figma-color-border, #d9d9d9);
    border-radius: 4px;
    background: var(--figma-color-bg, #ffffff);
    color: var(--figma-color-text, #1e1e1e);
    cursor: pointer;
    font: inherit;
    font-weight: 550;
    padding: 0 12px;
  }

  button.primary {
    border-color: var(--figma-color-bg-brand, #0d99ff);
    background: var(--figma-color-bg-brand, #0d99ff);
    color: var(--figma-color-text-onbrand, #ffffff);
  }

  button.danger {
    border-color: var(--figma-color-border-danger-strong, #f24822);
    color: var(--figma-color-text-danger, #b3261e);
  }

  button:hover {
    border-color: var(--figma-color-border-strong, #b3b3b3);
  }

  button:disabled {
    cursor: default;
    opacity: 0.45;
  }

  .panel {
    border: 1px solid var(--figma-color-border, #e5e5e5);
    border-radius: 6px;
    padding: 12px;
  }

  .panel-title {
    margin-bottom: 6px;
    font-weight: 650;
  }

  .status-line {
    color: var(--figma-color-text, #1e1e1e);
    line-height: 1.45;
  }

  .summary-line {
    color: var(--figma-color-text-secondary, #6b6b6b);
    line-height: 1.45;
  }

  .details-list {
    display: grid;
    gap: 8px;
    margin-top: 10px;
  }

  .detail-item {
    border-top: 1px solid var(--figma-color-border, #e5e5e5);
    padding-top: 8px;
  }

  .detail-title {
    color: var(--figma-color-text, #1e1e1e);
    font-weight: 550;
    line-height: 1.35;
  }

  .detail-meta {
    color: var(--figma-color-text-secondary, #6b6b6b);
    line-height: 1.45;
  }
</style>

<div class="app">
  <header>
    <h1>Color migration helper</h1>
    <p>Prime variables and remove unsupported color variants before fixing affected instances.</p>
  </header>

  <main>
    <div class="toolbar">
      <button class="primary" id="prime">Prime variables</button>
      <button class="primary" id="scanVariants">Scan variants</button>
      <button class="danger" id="applyVariants" disabled>Apply variant cleanup</button>
    </div>

    <section class="panel">
      <div class="panel-title">Missing instances</div>
      <div class="control-row">
        <label>
          Scope
          <select id="fixScope">
            <option value="selection">Selection</option>
            <option value="page">Current page</option>
            <option value="file">Whole file</option>
          </select>
        </label>
        <label>
          Support becomes
          <select id="supportMode"></select>
        </label>
      </div>
      <div class="toolbar" style="margin-top: 8px;">
        <button class="primary" id="scanMissing">Scan missing instances</button>
        <button class="danger" id="applyMissing" disabled>Fix missing instances</button>
      </div>
    </section>

    <section class="panel">
      <div class="panel-title">Result</div>
      <div class="status-line" id="operationStatus">Ready.</div>
      <div class="summary-line" id="operationSummary">No migration step has been run yet.</div>
      <div class="details-list" id="operationDetails"></div>
    </section>
  </main>
</div>

<script>
  const primeButton = document.getElementById('prime');
  const scanVariantsButton = document.getElementById('scanVariants');
  const applyVariantsButton = document.getElementById('applyVariants');
  const fixScopeSelect = document.getElementById('fixScope');
  const supportModeSelect = document.getElementById('supportMode');
  const scanMissingButton = document.getElementById('scanMissing');
  const applyMissingButton = document.getElementById('applyMissing');
  const operationStatus = document.getElementById('operationStatus');
  const operationSummary = document.getElementById('operationSummary');
  const operationDetails = document.getElementById('operationDetails');

  function send(message) {
    parent.postMessage({ pluginMessage: typeof message === 'string' ? { type: message } : message }, '*');
  }

  function setBusy(isBusy) {
    primeButton.disabled = isBusy;
    scanVariantsButton.disabled = isBusy;
    applyVariantsButton.disabled = isBusy || !applyVariantsButton.dataset.ready;
    fixScopeSelect.disabled = isBusy;
    supportModeSelect.disabled = isBusy;
    scanMissingButton.disabled = isBusy;
    applyMissingButton.disabled = isBusy || !applyMissingButton.dataset.ready;
  }

  function startOperation(message) {
    setBusy(true);
    operationStatus.textContent = message;
    operationSummary.textContent = 'Working...';
    operationDetails.innerHTML = '';
  }

  function renderOperationProgress(payload) {
    const progress = typeof payload.processed === 'number' && typeof payload.total === 'number'
      ? ` (${payload.processed}/${payload.total})`
      : '';
    operationStatus.textContent = `${payload.message}${progress}`;
  }

  function renderOperationResult(payload) {
    operationStatus.textContent = payload.message;
    applyVariantsButton.dataset.ready = payload.operation === 'scan-unsupported-variants' && payload.status === 'preview' ? 'true' : '';
    applyMissingButton.dataset.ready = payload.operation === 'scan-missing-instances' && payload.status === 'preview' ? 'true' : '';
    if (payload.operation === 'load-color-modes') {
      renderColorModes(payload);
    }
    setBusy(false);
    operationSummary.textContent = getResultSummary(payload);
    renderDetails(payload);
  }

  function renderDetails(payload) {
    operationDetails.innerHTML = '';

    if (payload.operation !== 'scan-missing-instances') {
      return;
    }

    const plans = payload.details && Array.isArray(payload.details.plans) ? payload.details.plans : [];
    const blockedPlans = plans.filter((plan) => plan.status === 'blocked');
    if (blockedPlans.length === 0) {
      return;
    }

    const heading = document.createElement('div');
    heading.className = 'detail-meta';
    heading.textContent = `Blocked details (${blockedPlans.length})`;
    operationDetails.appendChild(heading);

    for (const plan of blockedPlans.slice(0, 20)) {
      const item = document.createElement('div');
      item.className = 'detail-item';

      const title = document.createElement('div');
      title.className = 'detail-title';
      title.textContent = plan.instanceName || 'Unnamed instance';

      const meta = document.createElement('div');
      meta.className = 'detail-meta';
      meta.textContent = [
        `Page: ${plan.pageName || 'Unknown'}`,
        `Parent: ${plan.parentName || 'Unknown'}`,
        `Source: ${plan.sourceComponentName || 'Unknown'}`,
        `Color: ${plan.removedColor || 'unknown'}`,
        `Target: ${formatTargetPropertyValues(plan.targetPropertyValues)}`,
        `Candidates: ${typeof plan.targetCandidateCount === 'number' ? plan.targetCandidateCount : 'unknown'}`,
        `Reason: ${plan.reason || 'Unknown'}`,
      ].join(' | ');

      item.append(title, meta);
      operationDetails.appendChild(item);
    }

    if (blockedPlans.length > 20) {
      const more = document.createElement('div');
      more.className = 'detail-meta';
      more.textContent = `${blockedPlans.length - 20} more blocked instances not shown.`;
      operationDetails.appendChild(more);
    }
  }

  function formatTargetPropertyValues(targetPropertyValues) {
    if (!targetPropertyValues) {
      return 'none';
    }

    return Object.keys(targetPropertyValues)
      .map((key) => `${key}=${targetPropertyValues[key]}`)
      .join(', ');
  }

  function renderColorModes(payload) {
    const modes = payload.details && Array.isArray(payload.details.modes) ? payload.details.modes : [];
    supportModeSelect.innerHTML = '';

    for (const mode of modes) {
      const option = document.createElement('option');
      option.value = mode.modeId;
      option.textContent = mode.name;
      supportModeSelect.appendChild(option);
    }
  }

  function getResultSummary(payload) {
    const details = payload.details || {};

    if (payload.operation === 'prime-variables') {
      return `Renamed ${details.renamedVariableCount || 0} variables.`;
    }

    if (payload.operation === 'scan-unsupported-variants') {
      return `Scanned ${details.scannedComponentSetCount || 0} component sets. Found ${details.removeCount || 0} variants to remove, ${details.renameCount || 0} variants to rename, and ${details.alertMigrationCount || 0} Alert sets to migrate.`;
    }

    if (payload.operation === 'apply-unsupported-variants') {
      const alert = details.alertMigration || {};
      return `Removed ${details.removedCount || 0} variants, renamed ${details.renamedCount || 0}, migrated ${alert.migratedPaintCount || 0} Alert paints, failed ${details.failedCount || 0}.`;
    }

    if (payload.operation === 'load-color-modes') {
      return `Loaded ${(details.modes || []).length} color modes.`;
    }

    if (payload.operation === 'scan-missing-instances') {
      return `Scanned ${details.scannedInstanceCount || 0} instances. Ready ${details.readyCount || 0}, blocked ${details.blockedCount || 0}. Blocked means the plugin found a missing instance, but could not safely resolve its old color, target variant, or target mode.`;
    }

    if (payload.operation === 'apply-missing-instances') {
      return `Fixed ${details.fixedCount || 0} missing instances, failed ${details.failedCount || 0}.`;
    }

    return payload.message;
  }

  primeButton.onclick = () => {
    startOperation('Starting primer...');
    send('prime-variables');
  };

  scanVariantsButton.onclick = () => {
    startOperation('Scanning component sets...');
    send('scan-unsupported-variants');
  };

  applyVariantsButton.onclick = () => {
    const confirmed = window.confirm('This will remove unsupported color variants and rename remaining variants to remove the color property. Continue?');
    if (!confirmed) {
      return;
    }

    startOperation('Applying variant cleanup...');
    send('apply-unsupported-variants');
  };

  scanMissingButton.onclick = () => {
    startOperation('Scanning missing instances...');
    send({
      type: 'scan-missing-instances',
      scope: fixScopeSelect.value,
      supportModeId: supportModeSelect.value || null,
    });
  };

  applyMissingButton.onclick = () => {
    const confirmed = window.confirm('This will swap missing instances to the matching current variant and set their color mode. Continue?');
    if (!confirmed) {
      return;
    }

    startOperation('Fixing missing instances...');
    send('apply-missing-instances');
  };

  window.onmessage = (event) => {
    const message = event.data.pluginMessage;
    if (!message) {
      return;
    }

    if (message.type === 'operation-progress') {
      renderOperationProgress(message.payload);
      return;
    }

    if (message.type === 'operation-result') {
      renderOperationResult(message.payload);
    }
  };

  send('load-color-modes');
</script>
