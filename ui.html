<style>
  :root {
    color: var(--figma-color-text, #1e1e1e);
    background: var(--figma-color-bg, #ffffff);
    font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 12px;
  }

  body {
    margin: 0;
  }

  .app {
    min-height: 100vh;
  }

  p {
    margin: 0;
    color: var(--figma-color-text-secondary, #6b6b6b);
    line-height: 1.45;
  }

  main {
    display: grid;
    gap: 12px;
    padding: 16px;
  }

  .view {
    display: none;
    gap: 12px;
  }

  .view.view-active {
    display: grid;
  }

  .landing {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding: 8px 0;
  }

  .landing-card {
    display: grid;
    justify-items: center;
    align-content: center;
    gap: 12px;
    min-height: 140px;
    padding: 20px;
    text-align: center;
    transition: background 0.1s ease, border-color 0.1s ease;
  }

  .landing-card:hover {
    background: var(--figma-color-bg-hover, #f0f0f0);
    border-color: var(--figma-color-border-strong, #b3b3b3);
  }

  .landing-card svg {
    width: 28px;
    height: 28px;
    color: var(--figma-color-icon, #1e1e1e);
  }

  .landing-card-label {
    font-weight: 600;
    font-size: 13px;
  }

  /* Migration picker: full-width buttons, one per migration. */
  .migration-list {
    display: grid;
    gap: 8px;
  }

  .migration-button {
    width: 100%;
    min-height: 44px;
    font-weight: 600;
    transition: background 0.1s ease, border-color 0.1s ease;
  }

  .migration-button:hover {
    background: var(--figma-color-bg-hover, #f0f0f0);
    border-color: var(--figma-color-border-strong, #b3b3b3);
  }

  .view-header {
    display: flex;
    align-items: center;
    gap: 8px;
    min-height: 32px;
  }

  .back-button {
    display: grid;
    place-items: center;
    width: 32px;
    height: 32px;
    padding: 0;
    border: none;
    background: transparent;
    color: var(--figma-color-text-secondary, #6b6b6b);
    cursor: pointer;
  }

  .back-button:hover {
    background: var(--figma-color-bg-hover, #f0f0f0);
    border-radius: 4px;
  }

  .back-button svg {
    width: 16px;
    height: 16px;
  }

  #step-run {
    display: grid;
    gap: 12px;
  }

  .validation-msg {
    color: var(--figma-color-text-danger, #c00);
    margin-top: 8px;
  }

  .panel.panel-done {
    border-color: var(--figma-color-border-success, #2b7948);
    background: var(--figma-color-bg-success-tertiary, #f2fbf4);
  }

  .panel.panel-done .panel-title {
    color: var(--figma-color-text-success, #2b7948);
  }

  .panel {
    border: 1px solid var(--figma-color-border, #e5e5e5);
    border-radius: 6px;
    padding: 12px;
  }

  .is-hidden {
    /* Utility class must beat element rules that also set display (e.g.
       .toolbar { display: flex }), which would otherwise win on source order. */
    display: none !important;
  }

  .panel-title {
    margin-bottom: 6px;
    font-weight: 650;
  }

  /* Status card — colored frame + icon used to make a step's state
     unmistakable at a glance (e.g. the Prepare step). */
  .status-card {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    border: 1px solid var(--figma-color-border, #e5e5e5);
    border-radius: 6px;
    padding: 12px;
  }

  .status-card .status-icon {
    flex: 0 0 auto;
    width: 16px;
    height: 16px;
    margin-top: 1px;
    color: var(--figma-color-icon-secondary, #6b6b6b);
  }

  .status-card .status-icon svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  .status-card .status-body {
    flex: 1 1 auto;
    min-width: 0;
  }

  .status-card .status-text {
    margin: 0;
  }

  .status-card .status-note {
    margin: 4px 0 0;
    font-size: 11px;
    color: var(--figma-color-text-secondary, #6b6b6b);
  }

  .status-success {
    border-color: var(--figma-color-icon-success, #14ae5c);
    background: var(--figma-color-bg-success-tertiary, rgba(20, 174, 92, 0.08));
  }
  .status-success .status-icon {
    color: var(--figma-color-icon-success, #14ae5c);
  }

  .status-warning {
    border-color: var(--figma-color-icon-warning, #e5a800);
    background: var(--figma-color-bg-warning-tertiary, rgba(229, 168, 0, 0.1));
  }
  .status-warning .status-icon {
    color: var(--figma-color-icon-warning, #e5a800);
  }

  .status-error {
    border-color: var(--figma-color-icon-danger, #e03e3e);
    background: var(--figma-color-bg-danger-tertiary, rgba(224, 62, 62, 0.08));
  }
  .status-error .status-icon {
    color: var(--figma-color-icon-danger, #e03e3e);
  }

  .status-info {
    border-color: var(--figma-color-icon-brand, #0d99ff);
    background: var(--figma-color-bg-brand-tertiary, rgba(13, 153, 255, 0.08));
  }
  .status-info .status-icon {
    color: var(--figma-color-icon-brand, #0d99ff);
  }

  .status-neutral {
    border-left-width: 1px;
  }

  .toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .control-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .control-row.stacked {
    grid-template-columns: 1fr;
  }

  .checkbox-row {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    user-select: none;
    color: var(--figma-color-text, #1e1e1e);
    line-height: 1.35;
  }

  .checkbox-row input[type='checkbox'] {
    margin: 0;
  }

  label {
    display: grid;
    gap: 4px;
    color: var(--figma-color-text-secondary, #6b6b6b);
    line-height: 1.35;
  }

  select {
    min-height: 32px;
    border: 1px solid var(--figma-color-border, #d9d9d9);
    border-radius: 4px;
    background: var(--figma-color-bg, #ffffff);
    color: var(--figma-color-text, #1e1e1e);
    font: inherit;
    padding: 0 8px;
  }

  button {
    min-height: 32px;
    border: 1px solid var(--figma-color-border, #d9d9d9);
    border-radius: 4px;
    background: var(--figma-color-bg, #ffffff);
    color: var(--figma-color-text, #1e1e1e);
    cursor: pointer;
    font: inherit;
    font-weight: 550;
    padding: 0 12px;
  }

  button.primary {
    border-color: var(--figma-color-bg-brand, #0d99ff);
    background: var(--figma-color-bg-brand, #0d99ff);
    color: var(--figma-color-text-onbrand, #ffffff);
  }

  button:disabled {
    cursor: default;
    opacity: 0.45;
  }

  .status-line {
    color: var(--figma-color-text, #1e1e1e);
    line-height: 1.45;
  }

  .summary-line,
  .detail-meta {
    color: var(--figma-color-text-secondary, #6b6b6b);
    line-height: 1.45;
  }

  .details-list {
    display: grid;
    gap: 8px;
    margin-top: 10px;
  }

  .detail-item {
    border-top: 1px solid var(--figma-color-border, #e5e5e5);
    padding-top: 8px;
  }

  .detail-title {
    color: var(--figma-color-text, #1e1e1e);
    font-weight: 550;
    line-height: 1.35;
  }

  .instances-accordion {
    margin-top: 10px;
  }

  .instances-accordion summary {
    cursor: pointer;
    font-weight: 550;
    padding: 4px 0;
    color: var(--figma-color-text, #1e1e1e);
  }

  .instance-list {
    display: grid;
    gap: 4px;
    margin-top: 6px;
    max-height: 280px;
    overflow-y: auto;
  }

  .instance-link {
    display: block;
    width: 100%;
    min-height: auto;
    text-align: left;
    padding: 8px 10px;
    line-height: 1.35;
  }

  .instance-link:hover {
    background: var(--figma-color-bg-hover, #f5f5f5);
  }

  .instance-link-name {
    font-weight: 550;
    color: var(--figma-color-text, #1e1e1e);
  }

  .instance-link-meta {
    margin-top: 2px;
    font-weight: 400;
    color: var(--figma-color-text-secondary, #6b6b6b);
  }

  .busy-overlay {
    position: fixed;
    inset: 0;
    display: none;
    place-items: center;
    backdrop-filter: blur(12px);
    z-index: 10;
  }

  .busy-overlay.active {
    display: grid;
  }

  .busy-card {
    display: grid;
    justify-items: center;
    gap: 10px;
    border: 1px solid var(--figma-color-border, #e5e5e5);
    border-radius: 6px;
    background: var(--figma-color-bg, #ffffff);
    padding: 18px;
    width: min(280px, calc(100vw - 48px));
  }

  .busy-phase {
    font-weight: 600;
    text-align: center;
  }

  .busy-bar {
    width: 100%;
    height: 6px;
    border-radius: 999px;
    background: var(--figma-color-bg-secondary, #ebebeb);
    overflow: hidden;
  }

  .busy-bar-fill {
    height: 100%;
    width: 0%;
    border-radius: 999px;
    background: var(--figma-color-bg-brand, #0d99ff);
    transition: width 0.2s ease;
  }

</style>

<div class="app">
  <main>

    <!-- Migration picker — cards injected by the shell from the registry -->
    <section class="view view-active" id="migration-picker"></section>

    <!-- Color migration: flow chooser + library/sketches views -->
    <div class="migration-root is-hidden" id="migration-color">

    <!-- Color flow chooser -->
    <section class="view view-active" id="view-landing">
      <div class="view-header">
        <button class="back-button" data-go-to-migrations aria-label="Back to migrations">
          <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
      <div class="landing">
        <button class="landing-card" data-target-view="library">
          <!-- Nav Aksel: ComponentIcon -->
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path fill-rule="evenodd" clip-rule="evenodd" d="M12.5305 2.46967C12.2376 2.17678 11.7627 2.17678 11.4698 2.46967L7.96979 5.96967C7.6769 6.26256 7.6769 6.73744 7.96979 7.03033L11.4698 10.5303C11.7627 10.8232 12.2376 10.8232 12.5305 10.5303L16.0305 7.03033C16.3233 6.73744 16.3233 6.26256 16.0305 5.96967L12.5305 2.46967ZM12.0001 8.93934L9.56078 6.5L12.0001 4.06066L14.4395 6.5L12.0001 8.93934ZM18.0305 7.96967C17.7376 7.67678 17.2627 7.67678 16.9698 7.96967L13.4698 11.4697C13.1769 11.7626 13.1769 12.2374 13.4698 12.5303L16.9698 16.0303C17.2627 16.3232 17.7376 16.3232 18.0305 16.0303L21.5305 12.5303C21.8233 12.2374 21.8233 11.7626 21.5305 11.4697L18.0305 7.96967ZM17.5001 14.4393L15.0608 12L17.5001 9.56066L19.9395 12L17.5001 14.4393ZM5.96979 7.96967C6.26269 7.67678 6.73756 7.67678 7.03045 7.96967L10.5305 11.4697C10.8233 11.7626 10.8233 12.2374 10.5305 12.5303L7.03045 16.0303C6.73756 16.3232 6.26269 16.3232 5.96979 16.0303L2.46979 12.5303C2.1769 12.2374 2.1769 11.7626 2.46979 11.4697L5.96979 7.96967ZM4.06078 12L6.50012 14.4393L8.93946 12L6.50012 9.56066L4.06078 12ZM12.53 13.4697C12.2371 13.1768 11.7622 13.1768 11.4693 13.4697L7.96935 16.9697C7.67646 17.2626 7.67646 17.7374 7.96935 18.0303L11.4693 21.5303C11.7622 21.8232 12.2371 21.8232 12.53 21.5303L16.03 18.0303C16.3229 17.7374 16.3229 17.2626 16.03 16.9697L12.53 13.4697ZM11.9997 19.9393L9.56034 17.5L11.9997 15.0607L14.439 17.5L11.9997 19.9393Z" fill="currentColor"/>
          </svg>
          <span class="landing-card-label">Update library</span>
        </button>
        <button class="landing-card" data-target-view="sketches">
          <!-- Nav Aksel: DocPencilIcon -->
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path fill-rule="evenodd" clip-rule="evenodd" d="M11.2855 11.4827C11.2925 11.3664 11.3264 11.2534 11.3846 11.1526L15.8846 3.35837C16.644 2.04306 18.3259 1.59241 19.6412 2.3518C20.9565 3.11119 21.4072 4.79307 20.6478 6.10837L16.1478 13.9026C16.0896 14.0034 16.0087 14.0893 15.9115 14.1535L12.1795 16.6176C11.9424 16.7741 11.6372 16.7833 11.3912 16.6412C11.1452 16.4992 11.0005 16.2303 11.0176 15.9468L11.2855 11.4827ZM12.7722 11.7493L12.6047 14.5393L14.9373 12.9993L17.9647 7.75553L15.7997 6.50553L12.7722 11.7493ZM19.3487 5.35837L18.7147 6.45649L16.5497 5.20649L17.1837 4.10837C17.5289 3.5105 18.2933 3.30566 18.8912 3.65084C19.4891 3.99602 19.6939 4.7605 19.3487 5.35837ZM12.5 4.75H5.75V20.25H17.25V15.5C17.25 15.0858 17.5858 14.75 18 14.75C18.4142 14.75 18.75 15.0858 18.75 15.5V20.5C18.75 21.1904 18.1904 21.75 17.5 21.75H5.5C4.80964 21.75 4.25 21.1904 4.25 20.5V4.5C4.25 3.80964 4.80964 3.25 5.5 3.25H12.5C12.9142 3.25 13.25 3.58579 13.25 4C13.25 4.41421 12.9142 4.75 12.5 4.75Z" fill="currentColor"/>
          </svg>
          <span class="landing-card-label">Update files</span>
        </button>
      </div>
    </section>

    <!-- Library view -->
    <section class="view" id="view-library">
      <div class="view-header">
        <button class="back-button" data-target-view="landing" aria-label="Back">
          <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>

      <div class="status-card status-neutral" id="primeStatus">
        <span class="status-icon is-hidden" id="primeIcon" aria-hidden="true"></span>
        <div class="status-body">
          <p class="status-text" id="primeStatusText">Checking variable state...</p>
          <p class="status-note is-hidden" id="primeNote"></p>
          <div class="toolbar is-hidden" id="primeActions" style="margin-top: 10px;">
            <button class="primary" id="prime">Rename variables</button>
          </div>
        </div>
      </div>

      <section class="is-hidden" id="step-run">
        <section class="panel" id="runInputPanel">
          <div class="panel-title">Run migration</div>
          <div class="control-row stacked" style="margin-top: 10px;">
            <label>
              Use this mode for old support variants
              <select id="supportMode"></select>
            </label>
          </div>
          <p class="validation-msg is-hidden" id="supportModeError">Choose a color to replace "support" before running.</p>
          <div class="toolbar" style="margin-top: 10px;">
            <button class="primary" id="runMigration">Run migration</button>
          </div>
        </section>
        <section class="panel is-hidden" id="runResultPanel">
          <div class="panel-title" id="runResultTitle">Result</div>
          <div class="summary-line" id="runSummary"></div>
          <div class="details-list" id="runDetails"></div>
        </section>
      </section>
    </section>

    <!-- Sketches view -->
    <section class="view" id="view-sketches">
      <div class="view-header">
        <button class="back-button" data-target-view="landing" aria-label="Back">
          <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>

      <section class="panel" id="libraryScanInputPanel">
        <div class="panel-title">Update sketches that use this library</div>
        <div class="control-row stacked" style="margin-top: 10px;">
          <label>
            Scope
            <select id="libraryFixScope">
              <option value="selection">Selection</option>
              <option value="page">Current page</option>
              <option value="file">Whole file</option>
            </select>
          </label>
        </div>
        <div class="toolbar" style="margin-top: 10px;">
          <button class="primary" id="scanLibrary">Scan instances</button>
        </div>
      </section>
      <section class="panel is-hidden" id="libraryResultPanel">
        <div class="panel-title">Library scan result</div>
        <div class="summary-line" id="librarySummary"></div>
        <div class="control-row stacked is-hidden" id="librarySupportChoiceRow" style="margin-top: 10px;">
          <label>
            Replace 'support' with
            <select id="librarySupportMode"></select>
          </label>
        </div>
        <p class="validation-msg is-hidden" id="librarySupportModeError">Choose a color to replace "support" before updating.</p>
        <div class="details-list" id="libraryDetails"></div>
        <div class="toolbar" style="margin-top: 10px;">
          <button class="primary" id="applyLibrary" disabled>Update instances</button>
          <button id="scanAgain">Scan again</button>
        </div>
      </section>

    </section>

    </div>
    <!-- /migration-color -->

  </main>

  <div class="busy-overlay" id="busyOverlay">
    <div class="busy-card">
      <div class="busy-phase is-hidden" id="busyPhase"></div>
      <div class="busy-bar" id="busyBar"><div class="busy-bar-fill" id="busyBarFill"></div></div>
      <div class="status-line" id="busyText">Working...</div>
    </div>
  </div>
</div>

<script>
"use strict";
(() => {
  // ui/core/bridge.ts
  var activeController = null;
  function setActiveController(controller) {
    activeController = controller;
  }
  function send(domain, operation, args) {
    parent.postMessage({ pluginMessage: { type: "run", domain, operation, args } }, "*");
  }
  function focusNode(nodeId) {
    parent.postMessage({ pluginMessage: { type: "focus-node", nodeId } }, "*");
  }
  function initBridge() {
    window.onmessage = (event) => {
      const message = event.data.pluginMessage;
      if (!message || !activeController) {
        return;
      }
      if (message.type === "operation-progress") {
        activeController.onProgress(message.payload);
      } else if (message.type === "operation-result") {
        activeController.onResult(message.payload);
      }
    };
  }

  // ui/core/shell.ts
  var busyOverlayEl;
  var busyTextEl;
  function setBusyOverlay(isBusy, message) {
    busyOverlayEl.classList.toggle("active", isBusy);
    if (message) {
      busyTextEl.textContent = message;
    }
  }
  function showPicker(picker, controllers) {
    setActiveController(null);
    picker.classList.remove("is-hidden");
    for (const controller of controllers) {
      document.getElementById(controller.rootId).classList.add("is-hidden");
    }
  }
  function enterMigration(controller, picker, controllers) {
    picker.classList.add("is-hidden");
    for (const other of controllers) {
      document.getElementById(other.rootId).classList.toggle("is-hidden", other !== controller);
    }
    setActiveController(controller);
    controller.enter();
  }
  function initShell(controllers) {
    busyOverlayEl = document.getElementById("busyOverlay");
    busyTextEl = document.getElementById("busyText");
    const picker = document.getElementById("migration-picker");
    const list = document.createElement("div");
    list.className = "migration-list";
    for (const controller of controllers) {
      const button = document.createElement("button");
      button.className = "migration-button";
      button.textContent = controller.title;
      button.onclick = () => enterMigration(controller, picker, controllers);
      list.appendChild(button);
    }
    picker.appendChild(list);
    for (const el of document.querySelectorAll("[data-go-to-migrations]")) {
      el.addEventListener("click", () => showPicker(picker, controllers));
    }
    if (controllers.length === 1) {
      for (const el of document.querySelectorAll("[data-go-to-migrations]")) {
        const header = el.closest(".view-header");
        (header || el).classList.add("is-hidden");
      }
      enterMigration(controllers[0], picker, controllers);
      return;
    }
    showPicker(picker, controllers);
  }

  // ui/migrations/color/controller.ts
  var COLOR_ICON = '<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><circle cx="12" cy="12" r="8.25" stroke="currentColor" stroke-width="1.5"/><circle cx="9" cy="9.5" r="1.25" fill="currentColor"/><circle cx="15" cy="9.5" r="1.25" fill="currentColor"/><circle cx="9.5" cy="15" r="1.25" fill="currentColor"/></svg>';
  function createColorController() {
    const root = document.getElementById("migration-color");
    const viewSections = Array.from(root.querySelectorAll(".view"));
    const targetViewButtons = Array.from(root.querySelectorAll("[data-target-view]"));
    const stepRun = document.getElementById("step-run");
    const primeButton = document.getElementById("prime");
    const primeStatus = document.getElementById("primeStatus");
    const primeIcon = document.getElementById("primeIcon");
    const primeStatusText = document.getElementById("primeStatusText");
    const primeNote = document.getElementById("primeNote");
    const primeActions = document.getElementById("primeActions");
    const supportModeSelect = document.getElementById("supportMode");
    const supportModeError = document.getElementById("supportModeError");
    const libraryFixScopeSelect = document.getElementById("libraryFixScope");
    const libraryScanInputPanel = document.getElementById("libraryScanInputPanel");
    const scanLibraryButton = document.getElementById("scanLibrary");
    const scanAgainButton = document.getElementById("scanAgain");
    const applyLibraryButton = document.getElementById("applyLibrary");
    const libraryResultPanel = document.getElementById("libraryResultPanel");
    const librarySummary = document.getElementById("librarySummary");
    const libraryDetails = document.getElementById("libraryDetails");
    const librarySupportChoiceRow = document.getElementById("librarySupportChoiceRow");
    const librarySupportModeSelect = document.getElementById("librarySupportMode");
    const librarySupportModeError = document.getElementById("librarySupportModeError");
    const runButton = document.getElementById("runMigration");
    const runInputPanel = document.getElementById("runInputPanel");
    const runResultPanel = document.getElementById("runResultPanel");
    const runResultTitle = document.getElementById("runResultTitle");
    const runSummary = document.getElementById("runSummary");
    const runDetails = document.getElementById("runDetails");
    const busyPhase = document.getElementById("busyPhase");
    const busyBarFill = document.getElementById("busyBarFill");
    let activeSummary = null;
    let activeDetails = null;
    let primeReadyNote = "";
    function send2(operation, args) {
      send("color", operation, args);
    }
    const PRIME_ICONS = {
      success: '<svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.5"/><path d="M5 8.2l2 2 4-4.4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>',
      warning: '<svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M8 2l6.2 11H1.8L8 2z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M8 6.5v3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="8" cy="11.4" r="0.9" fill="currentColor"/></svg>',
      error: '<svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.5"/><path d="M5.5 5.5l5 5M10.5 5.5l-5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>',
      info: '<svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.5"/><path d="M8 7.2v4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="8" cy="4.7" r="0.9" fill="currentColor"/></svg>'
    };
    const PRIME_STATES = {
      checking: { cls: "status-neutral", icon: null, text: "Checking variable state...", button: false },
      needs: { cls: "status-warning", icon: "warning", text: "Rename the Main color collection to Color and remove color/main/ from variable names.", button: true },
      "needs-tokens": { cls: "status-warning", icon: "warning", text: "The Color collection is missing the new color modes. Export new tokens from Token Studio first.", button: false },
      ready: { cls: "status-success", icon: "success", text: "Variables are ready.", button: false },
      "not-library": { cls: "status-info", icon: "info", text: "This file does not appear to be a Core UI Kit library. Open the library file to run these steps.", button: false },
      error: { cls: "status-error", icon: "error", text: "Could not rename variables.", button: true }
    };
    function setPrimeState(state, message) {
      const config = PRIME_STATES[state] || PRIME_STATES.needs;
      const ready = state === "ready";
      primeStatus.className = "status-card " + config.cls;
      if (config.icon) {
        primeIcon.innerHTML = PRIME_ICONS[config.icon];
        primeIcon.classList.remove("is-hidden");
      } else {
        primeIcon.innerHTML = "";
        primeIcon.classList.add("is-hidden");
      }
      primeStatusText.textContent = (state === "error" || state === "needs-tokens") && message ? message : config.text;
      if (ready && primeReadyNote) {
        primeNote.textContent = primeReadyNote;
        primeNote.classList.remove("is-hidden");
      } else {
        primeNote.textContent = "";
        primeNote.classList.add("is-hidden");
      }
      primeReadyNote = "";
      primeActions.classList.toggle("is-hidden", !config.button);
      primeStatus.classList.toggle("is-hidden", ready);
      stepRun.classList.toggle("is-hidden", !ready);
      if (ready) {
        send2("load-color-modes");
      }
    }
    function resetLibraryFlowState() {
      runInputPanel.classList.remove("is-hidden");
      runResultPanel.classList.add("is-hidden");
      runResultPanel.classList.remove("panel-done");
      runResultTitle.textContent = "Result";
      setPrimeState("checking");
    }
    function resetSketchesFlowState() {
      libraryScanInputPanel.classList.remove("is-hidden");
      libraryResultPanel.classList.add("is-hidden");
      resetLibraryButtons();
    }
    function switchView(viewName) {
      for (const view of viewSections) {
        view.classList.toggle("view-active", view.id === `view-${viewName}`);
      }
      if (viewName === "library") {
        resetLibraryFlowState();
        send2("check-prime-status");
      } else if (viewName === "sketches") {
        resetSketchesFlowState();
      }
    }
    function setBusy(isBusy, message) {
      if (isBusy) {
        resetProgressIndicator();
      }
      primeButton.disabled = isBusy;
      supportModeSelect.disabled = isBusy;
      libraryFixScopeSelect.disabled = isBusy;
      scanLibraryButton.disabled = isBusy;
      scanAgainButton.disabled = isBusy;
      applyLibraryButton.disabled = isBusy || !applyLibraryButton.dataset.ready;
      runButton.disabled = isBusy;
      setBusyOverlay(isBusy, message);
    }
    function setActiveResult(panel, summary, details) {
      activeSummary = summary;
      activeDetails = details;
      panel.classList.remove("is-hidden");
    }
    function startOperation(message, panel, summary, details) {
      setActiveResult(panel, summary, details);
      setBusy(true, message);
      activeSummary.textContent = message;
      activeDetails.innerHTML = "";
    }
    function resetProgressIndicator() {
      busyPhase.classList.add("is-hidden");
      busyPhase.textContent = "";
      busyBarFill.style.width = "0%";
    }
    function activateLibraryApply(details) {
      const ready = details.readyCount || 0;
      const review = details.reviewCount || 0;
      const total = ready + review;
      const reviewNeedingAttention = Math.max(0, review - (details.instanceSupportFallbackCount || 0));
      let label = "Update instances";
      if (total > 0) {
        label = `Update ${total} instance${total === 1 ? "" : "s"}`;
        if (reviewNeedingAttention > 0) {
          label += ` (${reviewNeedingAttention} need${reviewNeedingAttention === 1 ? "s" : ""} review)`;
        }
      }
      applyLibraryButton.textContent = label;
      applyLibraryButton.dataset.ready = total > 0 ? "true" : "";
      applyLibraryButton.disabled = total === 0;
      const supportFallbackCount = details.supportFallbackCount || 0;
      const availableModes = Array.isArray(details.availableColorModes) ? details.availableColorModes : [];
      if (supportFallbackCount > 0 && availableModes.length > 0) {
        librarySupportModeSelect.innerHTML = "";
        const placeholder = document.createElement("option");
        placeholder.value = "";
        placeholder.textContent = "Select a color\u2026";
        placeholder.selected = true;
        librarySupportModeSelect.appendChild(placeholder);
        for (const mode of availableModes) {
          const option = document.createElement("option");
          option.value = mode.modeId;
          option.textContent = mode.name;
          librarySupportModeSelect.appendChild(option);
        }
        librarySupportChoiceRow.classList.remove("is-hidden");
      } else {
        librarySupportChoiceRow.classList.add("is-hidden");
      }
    }
    function resetLibraryButtons() {
      applyLibraryButton.textContent = "Update instances";
      applyLibraryButton.dataset.ready = "";
      applyLibraryButton.disabled = true;
      librarySupportChoiceRow.classList.add("is-hidden");
      librarySupportModeError.classList.add("is-hidden");
    }
    function renderOperationProgress(payload) {
      if (payload.phaseLabel) {
        const prefix = payload.phaseIndex && payload.phaseTotal ? `${payload.phaseIndex}/${payload.phaseTotal} \xB7 ` : "";
        busyPhase.textContent = `${prefix}${payload.phaseLabel}`;
        busyPhase.classList.remove("is-hidden");
        busyBarFill.style.width = "0%";
      }
      const hasCounts = typeof payload.processed === "number" && typeof payload.total === "number" && payload.total > 0;
      if (hasCounts) {
        busyBarFill.style.width = `${Math.min(100, Math.round(payload.processed / payload.total * 100))}%`;
      }
      const progress = hasCounts ? ` (${payload.processed}/${payload.total})` : "";
      const message = `${payload.message}${progress}`;
      if (activeSummary) {
        activeSummary.textContent = message;
      }
      busyText.textContent = message;
    }
    function renderOperationResult(payload) {
      if (payload.operation === "load-color-modes") {
        renderColorModes(payload);
        setBusy(false);
        return;
      }
      if (payload.operation === "check-prime-status") {
        const details = payload.details || {};
        setPrimeState(details.state || "needs", payload.message);
        setBusy(false);
        return;
      }
      if (payload.operation === "prime-variables") {
        if (payload.status === "error") {
          setPrimeState("error", payload.message);
          setBusy(false);
        } else {
          const renamed = (payload.details || {}).renamedVariableCount || 0;
          setPrimeState("checking");
          primeReadyNote = `Renamed ${renamed} variable${renamed === 1 ? "" : "s"}.`;
          send2("check-prime-status");
        }
        return;
      }
      setResultTargetForOperation(payload.operation);
      if (payload.operation === "scan-library-stuck-instances") {
        libraryScanInputPanel.classList.add("is-hidden");
        if (payload.status === "preview") {
          activateLibraryApply(payload.details || {});
        }
      } else if (payload.operation === "apply-library-stuck-instances") {
        resetLibraryButtons();
      }
      if (payload.operation === "run-migration" && payload.status === "success") {
        runInputPanel.classList.add("is-hidden");
        runResultPanel.classList.add("panel-done");
        runResultTitle.textContent = "Migration complete";
      }
      setBusy(false);
      activeSummary.textContent = getResultSummary(payload);
      renderDetails(payload);
    }
    function setResultTargetForOperation(operation) {
      if (operation === "scan-library-stuck-instances" || operation === "apply-library-stuck-instances") {
        setActiveResult(libraryResultPanel, librarySummary, libraryDetails);
        return;
      }
      if (operation === "run-migration") {
        setActiveResult(runResultPanel, runSummary, runDetails);
      }
    }
    function renderDetails(payload) {
      if (!activeDetails) {
        return;
      }
      activeDetails.innerHTML = "";
      if (payload.operation === "scan-library-stuck-instances") {
        renderLibraryDetails(payload);
        return;
      }
      if (payload.operation === "run-migration") {
        renderRunDetails(payload);
      }
    }
    function renderRunDetails(payload) {
      const details = payload.details || {};
      const errorComponentSets = Array.isArray(details.errorComponentSets) ? details.errorComponentSets : [];
      const failedVariants = Array.isArray(details.failedVariants) ? details.failedVariants : [];
      if (errorComponentSets.length === 0 && failedVariants.length === 0) {
        return;
      }
      if (errorComponentSets.length > 0) {
        const heading = document.createElement("div");
        heading.className = "detail-meta";
        heading.textContent = `Component sets with existing Figma errors \u2014 skipped (${errorComponentSets.length}): ${errorComponentSets.join(", ")}. Fix the variant conflicts and run again.`;
        runDetails.appendChild(heading);
      }
      if (failedVariants.length > 0) {
        renderRunAttentionList(`Variants that could not be updated (${failedVariants.length})`, failedVariants, (item) => ({
          nodeId: item.id,
          name: item.name || "Unnamed variant",
          meta: [item.action, item.reason].filter(Boolean).join(" \xB7 ")
        }));
      }
    }
    function renderRunAttentionList(headingText, items, mapItem) {
      const heading = document.createElement("div");
      heading.className = "detail-meta";
      heading.textContent = headingText;
      runDetails.appendChild(heading);
      const list = document.createElement("div");
      list.className = "instance-list";
      for (const item of items.slice(0, 50)) {
        const row = mapItem(item);
        const button = document.createElement("button");
        button.className = "instance-link";
        button.dataset.nodeId = row.nodeId;
        const name = document.createElement("div");
        name.className = "instance-link-name";
        name.textContent = row.name;
        const meta = document.createElement("div");
        meta.className = "instance-link-meta";
        meta.textContent = row.meta;
        button.append(name, meta);
        if (row.nodeId) {
          button.onclick = () => focusNode(row.nodeId);
        }
        list.appendChild(button);
      }
      runDetails.appendChild(list);
      if (items.length > 50) {
        const more = document.createElement("div");
        more.className = "detail-meta";
        more.textContent = `${items.length - 50} more not shown.`;
        runDetails.appendChild(more);
      }
    }
    function renderLibraryDetails(payload) {
      const plans = payload.details && Array.isArray(payload.details.plans) ? payload.details.plans : [];
      const support = plans.filter((plan) => plan.needsSupportModeChoice);
      if (support.length > 0) {
        renderInstanceAccordion(
          `Instances using the old support color (${support.length})`,
          support,
          (plan) => `${plan.pageName || "Unknown page"} \xB7 ${plan.parentName || "Unknown parent"}`
        );
      }
      const collapsed = plans.filter((plan) => plan.becameSingleComponent);
      if (collapsed.length > 0) {
        renderInstanceAccordion(
          `Instances to update manually (${collapsed.length})`,
          collapsed,
          (plan) => `${plan.pageName || "Unknown page"} \xB7 ${plan.parentName || "Unknown parent"} \xB7 was ${plan.oldComponentSetName || "Unknown component"}`
        );
      }
      const flagged = plans.filter((plan) => (plan.status === "blocked" || plan.status === "review") && !plan.needsSupportModeChoice && !plan.becameSingleComponent);
      if (flagged.length > 0) {
        const heading = document.createElement("div");
        heading.className = "detail-meta";
        heading.textContent = `Needs review (${flagged.length})`;
        activeDetails.appendChild(heading);
        for (const plan of flagged.slice(0, 20)) {
          const item = document.createElement("div");
          item.className = "detail-item";
          const title = document.createElement("div");
          title.className = "detail-title";
          title.textContent = plan.instanceName || "Unnamed instance";
          const meta = document.createElement("div");
          meta.className = "detail-meta";
          meta.textContent = [
            `Status: ${plan.status}`,
            `Page: ${plan.pageName || "Unknown"}`,
            `Parent: ${plan.parentName || "Unknown"}`,
            `Component: ${plan.oldComponentSetName || "Unknown"}`,
            `Old color: ${formatOptionalValue(plan.oldColorValue)}`,
            `Legacy mode: ${plan.legacyModeCollectionName ? plan.legacyModeCollectionName + " / " + plan.legacyModeName : "None"}`,
            `Target mode: ${plan.targetModeName || "Default"}`,
            `Why: ${plan.reason || "Unknown"}`
          ].join(" | ");
          item.append(title, meta);
          activeDetails.appendChild(item);
        }
        if (flagged.length > 20) {
          const more = document.createElement("div");
          more.className = "detail-meta";
          more.textContent = `${flagged.length - 20} more instances need review but are not shown.`;
          activeDetails.appendChild(more);
        }
      }
    }
    function renderInstanceAccordion(summaryText, plans, buildMeta) {
      const accordion = document.createElement("details");
      accordion.className = "instances-accordion";
      const summary = document.createElement("summary");
      summary.textContent = summaryText;
      accordion.appendChild(summary);
      const list = document.createElement("div");
      list.className = "instance-list";
      for (const plan of plans) {
        const button = document.createElement("button");
        button.className = "instance-link";
        button.dataset.instanceId = plan.instanceId;
        const name = document.createElement("div");
        name.className = "instance-link-name";
        name.textContent = plan.instanceName || "Unnamed instance";
        const meta = document.createElement("div");
        meta.className = "instance-link-meta";
        meta.textContent = buildMeta(plan);
        button.append(name, meta);
        button.onclick = () => {
          focusNode(plan.instanceId);
        };
        list.appendChild(button);
      }
      accordion.appendChild(list);
      activeDetails.appendChild(accordion);
    }
    function formatOptionalValue(value) {
      if (!value || value === "unknown") {
        return "Unknown";
      }
      return value;
    }
    function formatTargetPropertyValues(targetPropertyValues) {
      if (!targetPropertyValues) {
        return "None";
      }
      return Object.keys(targetPropertyValues).map((key) => `${key}=${targetPropertyValues[key]}`).join(", ");
    }
    function renderColorModes(payload) {
      const modes = payload.details && Array.isArray(payload.details.modes) ? payload.details.modes : [];
      supportModeError.classList.add("is-hidden");
      supportModeSelect.innerHTML = "";
      const placeholder = document.createElement("option");
      placeholder.value = "";
      placeholder.textContent = "Select a color\u2026";
      placeholder.selected = true;
      supportModeSelect.appendChild(placeholder);
      for (const mode of modes) {
        const option = document.createElement("option");
        option.value = mode.modeId;
        option.textContent = mode.name;
        supportModeSelect.appendChild(option);
      }
    }
    function supportLayerScanSuffix(details) {
      const cleanable = (details.supportLayerReadyCount || 0) + (details.supportLayerFallbackCount || 0);
      const reviewOnly = (details.supportLayerReviewCount || 0) - (details.supportLayerFallbackCount || 0);
      if (cleanable > 0) {
        return ` Plus ${cleanable} support layer${cleanable === 1 ? "" : "s"} to clean up${reviewOnly > 0 ? ` (${reviewOnly} need review)` : ""}.`;
      }
      if (reviewOnly > 0) {
        return ` ${reviewOnly} support layer${reviewOnly === 1 ? "" : "s"} need review.`;
      }
      return "";
    }
    function supportLayerApplySuffix(details) {
      const layers = details.supportLayerFixedCount || 0;
      if (layers === 0) {
        return "";
      }
      const bindings = details.supportBindingReboundCount || 0;
      return ` Cleaned up ${bindings} support binding${bindings === 1 ? "" : "s"} on ${layers} layer${layers === 1 ? "" : "s"}.`;
    }
    function getResultSummary(payload) {
      const details = payload.details || {};
      if (payload.status === "error") {
        return payload.message || "Something went wrong.";
      }
      if (payload.operation === "load-color-modes") {
        return `Loaded ${(details.modes || []).length} color modes.`;
      }
      if (payload.operation === "scan-library-stuck-instances") {
        const ready = details.readyCount || 0;
        const supportInstances = details.instanceSupportFallbackCount || 0;
        const review = Math.max(0, (details.reviewCount || 0) - supportInstances);
        const collapsed = details.becameSingleComponentCount || 0;
        const blocked = Math.max(0, (details.blockedCount || 0) - collapsed);
        const supportPart = supportInstances > 0 ? ` ${supportInstances} use the old support color (pick a replacement below).` : "";
        const collapsedPart = collapsed > 0 ? ` ${collapsed} instance${collapsed === 1 ? " needs" : "s need"} to be updated manually (see below).` : "";
        return `Scanned ${details.scannedInstanceCount || 0} instances. ${ready} ready, ${review} need review, ${blocked} blocked.${supportPart}${collapsedPart}${supportLayerScanSuffix(details)}`;
      }
      if (payload.operation === "apply-library-stuck-instances") {
        return `Updated ${details.fixedCount || 0} instance${details.fixedCount === 1 ? "" : "s"}. ${details.failedCount || 0} update${details.failedCount === 1 ? "" : "s"} failed.${supportLayerApplySuffix(details)}`;
      }
      return payload.message;
    }
    for (const button of targetViewButtons) {
      button.onclick = () => switchView(button.dataset.targetView);
    }
    primeButton.onclick = () => {
      setBusy(true, "Renaming variables...");
      send2("prime-variables");
    };
    supportModeSelect.onchange = () => {
      if (supportModeSelect.value) {
        supportModeError.classList.add("is-hidden");
      }
    };
    runButton.onclick = () => {
      if (!supportModeSelect.value) {
        supportModeError.classList.remove("is-hidden");
        supportModeSelect.focus();
        return;
      }
      supportModeError.classList.add("is-hidden");
      startOperation("Running migration...", runResultPanel, runSummary, runDetails);
      send2("run-migration", { supportModeId: supportModeSelect.value });
    };
    scanLibraryButton.onclick = () => {
      resetLibraryButtons();
      startOperation("Scanning library instances...", libraryResultPanel, librarySummary, libraryDetails);
      send2("scan-library-stuck-instances", {
        scope: libraryFixScopeSelect.value
      });
    };
    scanAgainButton.onclick = () => {
      resetSketchesFlowState();
    };
    librarySupportModeSelect.onchange = () => {
      if (librarySupportModeSelect.value) {
        librarySupportModeError.classList.add("is-hidden");
      }
    };
    applyLibraryButton.onclick = () => {
      const supportFallbackVisible = !librarySupportChoiceRow.classList.contains("is-hidden");
      if (supportFallbackVisible && !librarySupportModeSelect.value) {
        librarySupportModeError.classList.remove("is-hidden");
        librarySupportModeSelect.focus();
        return;
      }
      librarySupportModeError.classList.add("is-hidden");
      const supportFallbackModeId = supportFallbackVisible ? librarySupportModeSelect.value || null : null;
      startOperation("Updating library instances...", libraryResultPanel, librarySummary, libraryDetails);
      send2("apply-library-stuck-instances", {
        supportFallbackModeId
      });
    };
    return {
      id: "color",
      title: "Color migration",
      icon: COLOR_ICON,
      rootId: "migration-color",
      enter() {
        switchView("landing");
        send2("load-color-modes");
      },
      onProgress: renderOperationProgress,
      onResult: renderOperationResult
    };
  }

  // ui/main.ts
  initBridge();
  initShell([createColorController()]);
})();

</script>
